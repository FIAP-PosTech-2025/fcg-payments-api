services:
  tcpayments-api:
    build:
      context: .
      dockerfile: Payments.Api/Dockerfile
    image: tcpayments-img
    container_name: tcpayments-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5004
      PaymentRules__MaxPrecoAprovado: 200
      RabbitMq__HostName: host.docker.internal
      RabbitMq__Port: 5672
      RabbitMq__UserName: guest
      RabbitMq__Password: guest
      RabbitMq__VirtualHost: /
      RabbitMq__OrderPlacedQueue: OrderPlaced
      RabbitMq__PaymentProcessedQueue: PaymentProcessed
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "5004:5004"
